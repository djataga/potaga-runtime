name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      pack_ref:
        description: "potaga prompt-pack ref to test against (tag or branch)"
        default: "v4.2.0"

env:
  # The prompt-pack version this runtime is certified against. Pinned to a tag
  # so pack changes break CI deliberately (bump the pin), never surprisingly.
  PACK_REF: ${{ github.event.inputs.pack_ref || 'v4.2.0' }}

jobs:
  pack-compat:
    name: "prompt-pack compatibility (${{ github.event.inputs.pack_ref || 'v4.2.0' }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Fetch prompt pack at pinned ref
        run: |
          git clone --depth 1 --branch "$PACK_REF" \
            https://github.com/djataga/potaga.git /tmp/potaga \
          || { echo "::error::prompt pack ref '$PACK_REF' not found — has it been tagged/pushed?"; exit 1; }
      - name: Validate config contract (the cross-repo integration gate)
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from potaga_runtime.config import Config, ConfigError
          try:
              cfg = Config.load("/tmp/potaga")
          except ConfigError as e:
              print(f"::error::runtime cannot boot against pack ref: {e}")
              print("::error::the prompt pack violates a runtime invariant — "
                    "fix the pack or bump the runtime's expectations, deliberately.")
              raise SystemExit(1)
          routes = len(cfg.matrix["routes"])
          print(f"OK: runtime boots against the pack ({routes} routes validated)")
          EOF

  tests:
    name: "test suite (59 tests, offline)"
    runs-on: ubuntu-latest
    needs: pack-compat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch prompt pack at pinned ref
        run: git clone --depth 1 --branch "$PACK_REF" https://github.com/djataga/potaga.git /tmp/potaga
      - run: pip install -e ".[dev]"
      - name: Run tests
        env:
          POTAGA_REPO: /tmp/potaga
        run: python -m pytest tests/ -q
